# --- 1. Configuración Básica ---
set -g mouse on
set -s escape-time 0
set -g history-limit 50000
set -g status-position top

# CORRECCIÓN: Definición única y robusta para TrueColor
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- 2. Atajos ---
bind r source-file ~/.tmux.conf \; display "¡PowerKit Recargado!"

# --- Cambio de Prefijo ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- NAVEGACIÓN INTELIGENTE ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf|nano)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Limpiar pantalla con Prefijo + C-l
bind C-l send-keys 'C-l'

# --- Navegación Alt (Meta) ---
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-j switch-client -p
bind -n M-k switch-client -n

# --- 3. Lista de Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'christoomey/vim-tmux-navigator' 
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Configuración de Resurrect y Continuum (Inmortalidad)
# Guarda el estado de neovim también
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# --- 3.1 Atajos Avanzados (Power User) ---
# Popup flotante para consola general (Prefijo + g)
bind g display-popup -w 80% -h 80% -E "zsh"

# Tmux Sessionizer (Busca proyectos con fzf) (Prefijo + f)
bind f display-popup -w 70% -h 70% -E "tmux-sessionizer"

# --- 4. CONFIGURACIÓN DE POWERKIT ---
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"
set -g @powerkit_separator_style "slant"
set -g @powerkit_plugins "datetime,git"
set -g @powerkit_plugin_git_show_files "true"
set -g @powerkit_plugin_git_show_branch "true"
set -g @powerkit_plugin_git_max_length "20"
set -g @powerkit_transparent "true"
set -g @powerkit_status_interval "1"

# --- 5. Inicialización ---
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mantenemos extended-keys pero asegurándonos de que tmux lo maneje bien
set -g extended-keys on

# --- 6. Inicializar TPM (Siempre al final) ---
run '~/.tmux/plugins/tpm/tpm'
